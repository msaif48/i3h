<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Parametric House Generator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; display:flex; height:100vh; }
    #ui { width:360px; padding:16px; box-sizing:border-box; background:#f7f7f7; overflow:auto; }
    #canvas-wrap { flex:1; position:relative; }
    #viewer { width:100%; height:100%; display:block; }
    label{font-weight:600; display:block; margin-top:8px;}
    input[type=text], textarea { width:100%; padding:8px; box-sizing:border-box; }
    button { margin-top:10px; padding:10px 12px; cursor:pointer; }
    #status { margin-top:8px; color:#333; }
  </style>
</head>
<body>
  <div id="ui">
    <h2>House Generator</h2>
    <label>Prompt (example: "modern two storey house with balcony, red roof")</label>
    <input id="prompt" type="text" placeholder="modern two storey house with balcony, red roof" />
    <label>Optional facade image (jpg/png) — used as wall texture</label>
    <input id="imgfile" type="file" accept="image/*" />
    <label>Options</label>
    <div>
      <input id="exportGLB" type="checkbox" checked /> <label style="display:inline;font-weight:normal">Enable GLB download</label>
    </div>
    <button id="generate">Generate Model</button>
    <button id="download" disabled>Download GLB</button>
    <div id="status">Ready</div>
    <hr/>
    <div style="font-size:13px;color:#666">
      <strong>How it works</strong><br/>
      The page parses the prompt for keywords and builds a parametric 3D house using three.js. Upload a facade image to map onto walls.
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="viewer"></canvas>
  </div>

  <!-- three.js and exporters (from unpkg CDN) -->
