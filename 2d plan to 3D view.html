<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Architect Pro v48 - Sun Simulation & Realism</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --sidebar: #ffffff; --border: #e2e8f0; --danger: #ef4444; }
        body { margin: 0; display: flex; font-family: 'Inter', system-ui, sans-serif; height: 100vh; background: var(--bg); color: #1e293b; overflow: hidden; }
        
        .sidebar { width: 380px; background: var(--sidebar); padding: 20px; box-shadow: 4px 0 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 10; overflow-y: auto; }
        h2 { margin: 0 0 2px 0; font-size: 22px; letter-spacing: -0.5px; color: var(--primary); }
        .subtitle { font-size: 10px; color: #64748b; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        
        .dashboard { background: #f1f5f9; padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 15px; font-size: 11px; }
        .dash-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .status-badge { padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 9px; }
        
        .panel { background: #eff6ff; padding: 12px; border-radius: 6px; border: 1px dashed #93c5fd; margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 700; color: #475569; margin-bottom: 4px; text-transform: uppercase;}
        input, select { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; box-sizing: border-box; }
        
        .room-item { background: white; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--border); position: relative; border-left: 4px solid var(--border); display: flex; flex-direction: column; gap: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); transition: 0.1s;}
        .room-item.zone-public { border-left-color: #10b981; }
        .room-item.zone-semi { border-left-color: #f59e0b; }
        .room-item.zone-private { border-left-color: #8b5cf6; }
        .room-item.zone-circ { border-left-color: #64748b; }
        .room-item.error-state { border-color: var(--danger); background: #fef2f2; }
        
        .room-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .remove-btn { background: transparent; color: #94a3b8; border: none; cursor: pointer; font-size: 12px; font-weight: bold; padding: 0 5px;}
        .remove-btn:hover { color: var(--danger); }
        
        .room-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; width: 100%; }
        .room-inputs > div { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #64748b;}
        .room-inputs input { width: 100%; text-align: center; border: 1px solid var(--border); background: #f8fafc; font-weight: bold; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button { padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 12px;}
        .btn-param { background: #3b82f6; color: white; width: 100%; margin-top: 8px; }
        .btn-add { background: #e2e8f0; color: #475569; width: 100%; }
        .btn-run { background: var(--primary); color: white; width: 100%; }
        
        .action-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn-3d { background: #8b5cf6; color: white; flex: 1; font-size: 11px;}
        .btn-export { background: #10b981; color: white; flex: 1; font-size: 11px;}
        .btn-svg { background: #f59e0b; color: white; flex: 1; font-size: 11px;}

        .workspace { flex-grow: 1; position: relative; background: #e2e8f0; display: flex; flex-direction: column; }
        
        .floor-switcher { background: white; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; justify-content: space-between; z-index: 5;}
        .floor-tabs-container { display: flex; gap: 10px; }
        .floor-tab { padding: 6px 16px; border-radius: 20px; background: #f1f5f9; color: #64748b; font-weight: bold; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
        .floor-tab.active { background: #eff6ff; color: var(--accent); border-color: #bfdbfe; }
        
        .compass-badge { background: #0f172a; color: white; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 11px; letter-spacing: 1px;}

        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow: auto; width: 100%;}
        canvas { background: white; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #view-3d { width: 100%; height: 100%; display: none; position: absolute; top: 0; left: 0; z-index: 10;}
        
        .instruction { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; pointer-events: none; z-index: 5;}
        
        /* Sun Slider Styling */
        .slider-container { background: #fffbeb; padding: 10px; border-radius: 6px; border: 1px solid #fde68a; margin-bottom: 15px; }
        .slider-container label { display: flex; justify-content: space-between; color: #d97706; }
        input[type=range] { width: 100%; margin-top: 5px; accent-color: #f59e0b; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>Architect Pro</h2>
    <div class="subtitle">v48 - Sun Simulation & Realism</div>
    
    <div class="dashboard">
        <div class="dash-row"><span>Total Built: <b id="valBuilt">0 m²</b></span> <span>Max Footprint: <b id="valLand">0 m²</b></span></div>
        <div class="dash-row" style="margin-top: 4px; border-top: 1px solid #cbd5e1; padding-top: 6px;">
            <span>Floor Efficiency:</span> <span id="valEfficiency" class="status-badge">PENDING</span>
        </div>
    </div>

    <div class="slider-container">
        <label><span>☀️ Time of Day</span> <span id="timeLabel">12:00 PM</span></label>
        <input type="range" id="timeOfDay" min="6" max="20" step="0.5" value="12" oninput="updateSunlight()">
    </div>

    <div class="panel">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <div>
                <label>Plot Facing</label>
                <select id="plotFacing" style="background: #e0f2fe; font-weight:bold; color: var(--accent); border-color:#bae6fd;" onchange="renderCanvas()">
                    <option value="E">East Facing (Optimal)</option>
                    <option value="N">North Facing (Good)</option>
                    <option value="W">West Facing (Hot)</option>
                    <option value="S">South Facing</option>
                </select>
            </div>
            <div><label>Floors (F)</label><input id="paramF" type="number" value="2" min="1" max="4"/></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <div><label>Area/Floor(m²)</label><input id="paramA" type="number" value="120" /></div>
            <div><label>Total Beds (N)</label><input id="paramN" type="number" value="3" /></div>
            <div><label>Family</label><input id="paramPeople" type="number" value="4" /></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <div><label>Land Length (m)</label><input id="landLength" type="number" value="18" oninput="renderCanvas()" /></div>
            <div><label>Land Width (m)</label><input id="landWidth" type="number" value="12" oninput="renderCanvas()" /></div>
        </div>
        <button class="btn-param" onclick="generateParametric()">🏢 1. Generate Building</button>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <label style="margin: 0;">CURRENT FLOOR LAYOUT</label>
    </div>
    <div id="roomList"></div>

    <div class="btn-stack">
        <button class="btn-run" onclick="autoPackCurrentFloor()">🔀 2. Shuffle / Pack Floor</button>
        <button class="btn-add" onclick="addRoomManual()">✚ Add Block to Floor</button>
    </div>
    
    <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
    
    <div class="action-row">
        <button class="btn-3d" onclick="toggle3DView('floor')">👁️ 3D Floor</button>
        <button class="btn-3d" onclick="toggle3DView('building')">🏢 3D Building</button>
    </div>
    <div class="action-row">
        <button class="btn-export" onclick="exportJSON()">💾 Export JSON</button>
        <button class="btn-svg" onclick="exportSVG()">📐 Export Layered SVG</button>
    </div>
</div>

<div class="workspace">
    <div class="floor-switcher" id="floorSwitcher">
        <div class="floor-tabs-container" id="floorTabs"></div>
        <div class="compass-badge" id="compassBadge">🧭 N</div>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div class="instruction" id="drag-instruction">💡 2D Blueprints now have depth. Switch to 3D to play with the Sun!</div>
    </div>
    <div id="view-3d"></div>
</div>

<script>
window.buildingData = { floors: [], landL: 18, landW: 12, targetW: 0, targetH: 0 };
let activeFloorIndex = 0;
let current3DMode = null; 
let scene, camera, renderer, controls;
let globalSunLight, globalHemiLight; // Global lighting variables
let generatedOpenings = { doors: [], windows: [], mainDoor: null }; 

(() => {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const WALL_EXT = 0.3;  
    const WALL_INT = 0.15; 
    const SETBACKS = { front: 3, rear: 2, sides: 1.5 }; 
    const EPSILON = 0.1; // FIX: Increased math tolerance to absolutely prevent false-positive collisions

    const ZONES = {
        PUBLIC: { class: 'zone-public', color: '#f0fdf4', outline: '#10b981', order: 2 },
        SEMI: { class: 'zone-semi', color: '#fffbeb', outline: '#f59e0b', order: 1 }, 
        PRIVATE: { class: 'zone-private', color: '#faf5ff', outline: '#8b5cf6', order: 3 },
        CIRC: { class: 'zone-circ', color: '#f8fafc', outline: '#64748b', order: 0 } 
    };

    const types = {
        Staircase:      { zone: ZONES.CIRC, min: 2.0, icon: drawStairs },
        Corridor:       { zone: ZONES.CIRC, min: 1.5, icon: null }, 
        Hall:           { zone: ZONES.PUBLIC, min: 3.0, icon: drawSofa },
        Dining:         { zone: ZONES.PUBLIC, min: 2.5, icon: drawTable },
        "Sit-out":      { zone: ZONES.PUBLIC, min: 1.5, icon: null }, 
        Kitchen:        { zone: ZONES.SEMI, min: 2.5, icon: drawKitchen },
        "Common Bath":  { zone: ZONES.SEMI, min: 1.5, icon: drawBath }, 
        "Car Porch":    { zone: ZONES.SEMI, min: 3.0, icon: drawCar }, 
        Bedroom:        { zone: ZONES.PRIVATE, min: 3.0, icon: drawBed },
        Pooja:          { zone: ZONES.PRIVATE, min: 1.5, icon: null }, 
        "Attached Bath":{ zone: ZONES.PRIVATE, min: 1.5, icon: drawBath },
        Balcony:        { zone: ZONES.PUBLIC, min: 1.5, icon: null }
    };

    const validConnections = {
        'Hall': ['Dining', 'Kitchen', 'Corridor', 'Staircase', 'Balcony', 'Bedroom', 'Sit-out', 'Pooja'], 
        'Corridor': ['Hall', 'Bedroom', 'Common Bath', 'Staircase', 'Pooja'], 
        'Dining': ['Hall', 'Kitchen'],
        'Kitchen': ['Hall', 'Dining'],
        'Bedroom': ['Hall', 'Corridor', 'Attached Bath', 'Balcony'],
        'Attached Bath': ['Bedroom'],
        'Common Bath': ['Hall', 'Corridor'],
        'Staircase': ['Hall', 'Corridor', 'Car Porch'],
        'Balcony': ['Hall', 'Bedroom'],
        'Sit-out': ['Hall', 'Car Porch'],
        'Car Porch': ['Sit-out', 'Staircase'],
        'Pooja': ['Hall', 'Corridor']
    };

    function canConnect(typeA, typeB) {
        if (validConnections[typeA] && validConnections[typeA].includes(typeB)) return true;
        if (validConnections[typeB] && validConnections[typeB].includes(typeA)) return true;
        return false;
    }

    function getMinDim(rooms) {
        return Math.min(...rooms.map(r => types[r.type]?.min || 2.0));
    }

    // --- BSP ENGINE ---
    function bsp(x, y, w, h, rooms) {
        if (!rooms || rooms.length === 0) return;
        x = Math.round(x * 10) / 10; y = Math.round(y * 10) / 10;
        w = Math.round(w * 10) / 10; h = Math.round(h * 10) / 10;

        if (rooms.length === 1) { rooms[0].x = x; rooms[0].y = y; rooms[0].w = w; rooms[0].h = h; return; }
        
        let totalWeight = rooms.reduce((s,r)=>s+r.weight,0); let half = totalWeight / 2; let cur=0, idx=1;
        for(let i=0; i<rooms.length-1; i++){ cur += rooms[i].weight; if(cur >= half) { idx = i+1; break; } }
        
        let listA = rooms.slice(0, idx); let listB = rooms.slice(idx);
        let ratio = listA.reduce((s,r)=>s+r.weight,0) / totalWeight;

        let minA = getMinDim(listA); let minB = getMinDim(listB);

        if (w > h) { 
            let splitW = Math.round((w * ratio) * 10) / 10;
            if (splitW < minA) splitW = minA; if (w - splitW < minB) splitW = w - minB; if (splitW < minA) splitW = w / 2; 
            let remainW = Math.round((w - splitW) * 10) / 10;
            bsp(x, y, splitW, h, listA); bsp(Math.round((x + splitW)*10)/10, y, remainW, h, listB);
        } else { 
            let splitH = Math.round((h * ratio) * 10) / 10;
            if (splitH < minA) splitH = minA; if (h - splitH < minB) splitH = h - minB; if (splitH < minA) splitH = h / 2;
            let remainH = Math.round((h - splitH) * 10) / 10;
            bsp(x, y, w, splitH, listA); bsp(x, Math.round((y + splitH)*10)/10, w, remainH, listB);
        }
    }

    function doFloorBSP(roomsList, isShuffle = false) {
        if (isShuffle) {
            let mainRooms = roomsList.filter(r => r.type !== 'Staircase'); let stair = roomsList.find(r => r.type === 'Staircase');
            mainRooms.sort(() => Math.random() - 0.5); roomsList = stair ? [stair, ...mainRooms] : mainRooms;
        } else {
            roomsList.sort((a, b) => types[a.type].zone.order - types[b.type].zone.order);
        }

        let finalRooms = [];
        const targetW = window.buildingData.targetW; const targetH = window.buildingData.targetH;
        const startX = SETBACKS.sides; const startY = SETBACKS.front;

        let stair = roomsList.find(r => r.type === 'Staircase'); let otherRooms = roomsList.filter(r => r.type !== 'Staircase');

        if (stair) {
            let gfStair = window.buildingData.floors[0]?.find(r => r.type === 'Staircase');
            let stairW = gfStair ? gfStair.w : Math.max(2.5, Math.round(targetW * 0.25 * 10)/10);
            let stairH = gfStair ? gfStair.h : Math.max(3.5, Math.round(targetH * 0.3 * 10)/10);
            
            finalRooms.push({type: 'Staircase', x: startX, y: startY, w: stairW, h: stairH, id: 'stair'});
            
            let areaA = (targetW - stairW) * stairH; let areaB = targetW * (targetH - stairH); let ratioA = areaA / (areaA + areaB);
            let targetAWeight = otherRooms.reduce((s, r)=>s+r.weight, 0) * ratioA; let cur = 0, idx = 1;
            for(let i=0; i<otherRooms.length; i++) { cur += otherRooms[i].weight; if(cur >= targetAWeight && i < otherRooms.length - 1) { idx = i + 1; break; } }
            
            let listA = otherRooms.slice(0, idx); let listB = otherRooms.slice(idx);
            if (listA.length === 0 && listB.length > 1) listA.push(listB.shift()); if (listB.length === 0 && listA.length > 1) listB.push(listA.pop());
            
            let w1 = Math.round((targetW - stairW)*10)/10; let h2 = Math.round((targetH - stairH)*10)/10;
            bsp(Math.round((startX + stairW)*10)/10, startY, w1, stairH, listA);
            bsp(startX, Math.round((startY + stairH)*10)/10, targetW, h2, listB);
            
            [...listA, ...listB].forEach((r, i) => mapRoomData(r, finalRooms, i));
        } else {
            bsp(startX, startY, targetW, targetH, otherRooms);
            otherRooms.forEach((r, i) => mapRoomData(r, finalRooms, i));
        }
        return finalRooms;
    }

    function mapRoomData(r, finalRooms, index) {
        let baseId = `room_${index}_${Math.random().toString(36).substr(2, 5)}`;
        finalRooms.push({type: r.type, x: r.x, y: r.y, w: r.w, h: r.h, id: baseId});
        if (r.hasBath) {
            let bw = Math.round(Math.max(1.5, Math.min(2.5, r.w * 0.4)) * 10)/10; let bh = Math.round(Math.max(1.5, Math.min(2.5, r.h * 0.4)) * 10)/10;
            let bx = Math.round((r.x + r.w - bw - WALL_EXT) * 10)/10; let by = Math.round((r.y + WALL_EXT) * 10)/10;
            finalRooms.push({type: 'Attached Bath', x: bx, y: by, w: bw, h: bh, id: `${baseId}_bath`});
        }
    }

    window.generateParametric = function() {
        document.getElementById("roomList").innerHTML = "";
        const A = +document.getElementById("paramA").value; const F = +document.getElementById("paramF").value;
        const N = +document.getElementById("paramN").value; const L = +document.getElementById("landLength").value || 20;
        const W = +document.getElementById("landWidth").value || 15;

        window.buildingData.floors = [];
        let maxW = L - SETBACKS.sides * 2; let maxH = W - SETBACKS.front - SETBACKS.rear;
        let maxBuildableArea = (maxW > 0 && maxH > 0) ? (maxW * maxH) : 0;
        let safeA = Math.min(A, maxBuildableArea); 
        
        let tW = Math.round(Math.sqrt(safeA * 1.2) * 10) / 10; let tH = Math.round((safeA / tW) * 10) / 10;
        if (tW > maxW) { tW = maxW; tH = Math.round((safeA / tW) * 10) / 10; }
        if (tH > maxH) { tH = maxH; tW = Math.round((safeA / tH) * 10) / 10; }
        if (tW > maxW) tW = maxW; if (tH > maxH) tH = maxH;
        
        window.buildingData.targetW = tW; window.buildingData.targetH = tH;
        window.buildingData.landL = L; window.buildingData.landW = W;

        let bedsRem = N;
        for (let f = 0; f < F; f++) {
            let floorRooms = [];
            if (F > 1) floorRooms.push({type: 'Staircase', weight: 10});

            if (f === 0) {
                floorRooms.push({type: 'Car Porch', weight: 15}, {type: 'Sit-out', weight: 5}, {type: 'Hall', weight: 35}, {type: 'Dining', weight: 15}, {type: 'Kitchen', weight: 15}, {type: 'Common Bath', weight: 5});
                if (N >= 3) floorRooms.push({type: 'Pooja', weight: 5}); 
                if (F === 1 && N >= 2) floorRooms.push({type: 'Corridor', weight: 10});

                if (F === 1) { for(let i=0; i<N; i++) floorRooms.push({type: 'Bedroom', weight: 20, hasBath: i < Math.ceil(N/2)}); bedsRem = 0; } 
                else if (N >= 3) { floorRooms.push({type: 'Bedroom', weight: 20, hasBath: false}); bedsRem--; }
            } else {
                let bCount = Math.min(bedsRem, Math.ceil(bedsRem / (F - f)));
                if (bCount >= 2) floorRooms.push({type: 'Corridor', weight: 15}); 
                
                for(let i=0; i<bCount; i++) floorRooms.push({type: 'Bedroom', weight: 30, hasBath: (N - bedsRem + i) < Math.ceil(N/2)});
                bedsRem -= bCount;
                if (f === F - 1) floorRooms.push({type: 'Balcony', weight: 15});
                else floorRooms.push({type: 'Hall', weight: 20}); 
            }
            window.buildingData.floors.push(doFloorBSP(floorRooms, false));
        }

        buildFloorTabs(); activeFloorIndex = 0; switchFloor(0);
    };

    window.autoPackCurrentFloor = function() {
        if (!window.buildingData.floors[activeFloorIndex]) return;
        const els = [...document.querySelectorAll(".room-item")];
        let roomsToShuffle = [];
        function isInside(child, parent) {
            let cx = +child.querySelector(".rx").value, cy = +child.querySelector(".ry").value; let px = +parent.querySelector(".rx").value, py = +parent.querySelector(".ry").value;
            let pw = +parent.querySelector(".rw").value, ph = +parent.querySelector(".rh").value; return (cx >= px && cy >= py && cx <= px+pw && cy <= py+ph);
        }
        els.forEach(el => {
            const type = el.querySelector("select").value;
            if (type !== 'Attached Bath') {
                const w = +el.querySelector(".rw").value; const h = +el.querySelector(".rh").value;
                const varWeight = (w * h) * (1 + (Math.random() * 0.3 - 0.15));
                roomsToShuffle.push({ type: type, weight: varWeight, hasBath: type === 'Bedroom' && els.some(o => o.querySelector("select").value === 'Attached Bath' && isInside(o, el)) });
            }
        });
        window.buildingData.floors[activeFloorIndex] = doFloorBSP(roomsToShuffle, true);
        loadFloorToDOM(activeFloorIndex); renderCanvas();
    }

    // --- UI HELPERS ---
    function buildFloorTabs() {
        const switcher = document.getElementById("floorTabs"); switcher.innerHTML = "";
        window.buildingData.floors.forEach((_, i) => {
            const btn = document.createElement("div"); btn.className = `floor-tab ${i === activeFloorIndex ? 'active' : ''}`;
            btn.innerText = i === 0 ? "Ground Floor" : `Floor ${i}`; btn.onclick = () => switchFloor(i); switcher.appendChild(btn);
        });
    }

    window.switchFloor = function(index) {
        saveCurrentFloorUI(); activeFloorIndex = index;
        document.querySelectorAll('.floor-tab').forEach((t, i) => t.className = `floor-tab ${i === activeFloorIndex ? 'active' : ''}`);
        loadFloorToDOM(index); renderCanvas(); if(current3DMode) build3DModel(current3DMode); 
    }

    function saveCurrentFloorUI() {
        if (!window.buildingData.floors[activeFloorIndex]) return;
        const els = [...document.querySelectorAll(".room-item")]; if (els.length === 0) return; 
        window.buildingData.floors[activeFloorIndex] = els.map((el, i) => ({
            type: el.querySelector("select").value, w: +el.querySelector(".rw").value, h: +el.querySelector(".rh").value,
            x: +el.querySelector(".rx").value, y: +el.querySelector(".ry").value, id: window.buildingData.floors[activeFloorIndex][i]?.id || `manual_${i}`
        }));
    }

    window.loadFloorToDOM = function(index) {
        const list = document.getElementById("roomList"); list.innerHTML = "";
        if(window.buildingData.floors[index]) { window.buildingData.floors[index].forEach(r => addRoomNode(r.type, r.w, r.h, r.x, r.y)); }
    }

    function addRoomNode(type, w, h, x, y) {
        const div = document.createElement("div"); div.className = `room-item ${types[type] ? types[type].zone.class : ''}`;

    window.addRoomManual = function() { window.buildingData.floors[activeFloorIndex].push({type: 'Bedroom', w:4, h:4, x:SETBACKS.sides, y:SETBACKS.front, id:`man_${Math.random()}`}); loadFloorToDOM(activeFloorIndex); renderCanvas(); }
    window.updateZone = function(selectEl) { const type = selectEl.value; selectEl.parentElement.parentElement.className = `room-item ${types[type].zone.class}`; }
    
    // FIX: Increased collision tolerance to 0.15 to prevent micro-overlap bugs
    function isOverlap(a, b) { const tol = 0.15; return !(a.x + a.w <= b.x + tol || a.x >= b.x + b.w - tol || a.y + a.h <= b.y + tol || a.y >= b.y + b.h - tol); }

    function calculateOpenings(rooms, L, W, activeFloor) {
        let doors = []; let windows = []; let mainDoor = null; let connectedPairs = new Set(); 
        const DOOR_W = 0.85; const BATH_DOOR_W = 0.75; const MAIN_DOOR_W = 1.2; 
        const facing = document.getElementById("plotFacing").value;
        document.getElementById("compassBadge").innerText = `🧭 COMPASS: ${facing}`;

        for (let i = 0; i < rooms.length; i++) {
            let a = rooms[i]; if (a.hasError || a.type === 'Balcony' || a.type === 'Car Porch' || a.type === 'Sit-out') continue;

            if (activeFloor === 0 && (a.type === 'Hall' || a.type === 'Sit-out') && !mainDoor) {
                let wt = a.wt || WALL_EXT;
                if (facing === 'S' && Math.abs((a.y + a.h) - (W - SETBACKS.rear)) < 0.15) { mainDoor = {x: a.x + a.w/2 - MAIN_DOOR_W/2, y: a.y + a.h - wt/2, w: MAIN_DOOR_W, h: wt, isVert: false, room: a}; }
                if (facing === 'N' && Math.abs(a.y - SETBACKS.front) < 0.15) { mainDoor = {x: a.x + a.w/2 - MAIN_DOOR_W/2, y: a.y + wt/2, w: MAIN_DOOR_W, h: wt, isVert: false, room: a}; }
                if (facing === 'W' && Math.abs(a.x - SETBACKS.sides) < 0.15) { mainDoor = {x: a.x + wt/2, y: a.y + a.h/2 - MAIN_DOOR_W/2, w: wt, h: MAIN_DOOR_W, isVert: true, room: a}; }
                if (facing === 'E' && Math.abs((a.x + a.w) - (L - SETBACKS.sides)) < 0.15) { mainDoor = {x: a.x + a.w - wt/2, y: a.y + a.h/2 - MAIN_DOOR_W/2, w: wt, h: MAIN_DOOR_W, isVert: true, room: a}; }
            }

            let roomArea = a.w * a.h; let baseWinArea = a.type.includes('Bath') ? roomArea * 0.05 : roomArea * 0.12; 
            if (a.type === 'Corridor') baseWinArea = 0; 
            
            let isExtW = Math.abs(a.x - SETBACKS.sides) < 0.15; let isExtE = Math.abs((a.x + a.w) - (L - SETBACKS.sides)) < 0.15;
            let isExtN = Math.abs(a.y - SETBACKS.front) < 0.15; let isExtS = Math.abs((a.y + a.h) - (W - SETBACKS.rear)) < 0.15;
            let wt = a.wt || WALL_EXT;

            let winS = Math.max(0.6, Math.min((baseWinArea * 0.6) / 1.2, a.w * 0.4)); let winW = Math.max(0.6, Math.min((baseWinArea * 0.5) / 1.2, a.h * 0.3)); 
            let winN = Math.max(0.6, Math.min((baseWinArea * 1.2) / 1.2, a.w * 0.6)); let winE = Math.max(0.6, Math.min((baseWinArea * 1.2) / 1.2, a.h * 0.6)); 

            if (a.type.includes('Bath')) { winS=0.6; winW=0.6; winN=0.6; winE=0.6; }

            if (baseWinArea > 0) {
                if (isExtS && a.w > winS + 1.0 && !(mainDoor && mainDoor.room === a && facing === 'S')) windows.push({x: a.x + a.w/2 - winS/2, y: a.y + a.h - wt, w: winS, h: wt, isVert: false, room: a});
                else if (isExtN && a.w > winN + 1.0 && !(mainDoor && mainDoor.room === a && facing === 'N')) windows.push({x: a.x + a.w/2 - winN/2, y: a.y, w: winN, h: wt, isVert: false, room: a});
                else if (isExtE && a.h > winE + 1.0 && !(mainDoor && mainDoor.room === a && facing === 'E')) windows.push({x: a.x + a.w - wt, y: a.y + a.h/2 - winE/2, w: wt, h: winE, isVert: true, room: a});
                else if (isExtW && a.h > winW + 1.0 && !(mainDoor && mainDoor.room === a && facing === 'W')) windows.push({x: a.x, y: a.y + a.h/2 - winW/2, w: wt, h: winW, isVert: true, room: a});
            }

            for (let j = i + 1; j < rooms.length; j++) {
                let b = rooms[j]; if (b.hasError || b.type === 'Balcony' || b.type === 'Car Porch') continue;
                if (!canConnect(a.type, b.type)) continue;

                let pairId = [a.id, b.id].sort().join('-'); if (connectedPairs.has(pairId)) continue; 
                let dw = (a.type.includes('Bath') || b.type.includes('Bath')) ? BATH_DOOR_W : DOOR_W;

                if (Math.abs((a.x + a.w) - b.x) < EPSILON || Math.abs((b.x + b.w) - a.x) < EPSILON) {
                    let yStart = Math.max(a.y, b.y); let yEnd = Math.min(a.y + a.h, b.y + b.h);
                    if (yEnd - yStart >= dw + 0.4) {
                        let dY = yStart + 0.2; let dX = Math.abs((a.x + a.w) - b.x) < EPSILON ? a.x + a.w : b.x + b.w;
                        doors.push({x: dX - wt/2, y: dY, w: wt, h: dw, isVert: true}); connectedPairs.add(pairId); 
                    }
                }
                else if (Math.abs((a.y + a.h) - b.y) < EPSILON || Math.abs((b.y + b.h) - a.y) < EPSILON) {
                    let xStart = Math.max(a.x, b.x); let xEnd = Math.min(a.x + a.w, b.x + b.w);
                    if (xEnd - xStart >= dw + 0.4) {
                        let dX = xStart + 0.2; let dY = Math.abs((a.y + a.h) - b.y) < EPSILON ? a.y + a.h : b.y + b.h;
                        doors.push({x: dX, y: dY - wt/2, w: dw, h: wt, isVert: false}); connectedPairs.add(pairId); 
                    }
                }
            }
        }
        return {doors, windows, mainDoor};
    }

    // --- 2D RENDERER ---
    let scale = 30;

    window.renderCanvas = function() {
        saveCurrentFloorUI(); 
        const L = +document.getElementById("landLength").value || 20; const W = +document.getElementById("landWidth").value || 15;
        const container = document.getElementById("canvas-container");
        scale = Math.min((container.clientWidth - 100) / L, (container.clientHeight - 80) / W, 60);
        canvas.width = L * scale; canvas.height = W * scale; ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Grid Background
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(99, 102, 241, 0.15)"; ctx.lineWidth = 1; const gridSpacing = 3; ctx.beginPath();
        for(let x = SETBACKS.sides; x <= L - SETBACKS.sides + EPSILON; x += gridSpacing) { ctx.moveTo(x * scale, SETBACKS.front * scale); ctx.lineTo(x * scale, (W - SETBACKS.rear) * scale); }
        for(let y = SETBACKS.front; y <= W - SETBACKS.rear + EPSILON; y += gridSpacing) { ctx.moveTo(SETBACKS.sides * scale, y * scale); ctx.lineTo((L - SETBACKS.sides) * scale, y * scale); }
        ctx.stroke();

        ctx.strokeStyle = "#ef4444"; ctx.setLineDash([5, 5]); ctx.lineWidth = 1; ctx.strokeRect(SETBACKS.sides * scale, SETBACKS.front * scale, (L - SETBACKS.sides*2) * scale, (W - SETBACKS.front - SETBACKS.rear) * scale); ctx.setLineDash([]);

        if (!window.buildingData.floors[activeFloorIndex]) return;

        let rooms = window.buildingData.floors[activeFloorIndex].map(r => ({...r, isNested: false, hasError: false, isOut: false, isColliding: false, nestedParent: null}));
        let floorUsable = 0;

        for (let i = 0; i < rooms.length; i++) {
            let r = rooms[i];
            for (let j = 0; j < rooms.length; j++) {
                if (i === j) continue; let other = rooms[j];
                if (r.w < other.w && r.h < other.h) { if (r.x >= other.x - EPSILON && r.y >= other.y - EPSILON && r.x + r.w <= other.x + other.w + EPSILON && r.y + r.h <= other.y + other.h + EPSILON) { r.isNested = true; r.nestedParent = other; break; } }
            }
        }
        for (let i = 0; i < rooms.length; i++) {
            let r = rooms[i];
            if (r.x < SETBACKS.sides - EPSILON || r.y < SETBACKS.front - EPSILON || r.x + r.w > L - SETBACKS.sides + EPSILON || r.y + r.h > W - SETBACKS.rear + EPSILON) { r.hasError = true; r.isOut = true; }
            for (let j = i + 1; j < rooms.length; j++) {
                let other = rooms[j]; if (r.nestedParent === other || other.nestedParent === r) continue;
                if (isOverlap(r, other)) { r.hasError = true; other.hasError = true; r.isColliding = true; other.isColliding = true; }
            }
            let wt = r.isNested ? WALL_INT : WALL_EXT; r.wt = wt; 
            if(!r.hasError && r.type !== 'Attached Bath' && r.type !== 'Car Porch' && r.type !== 'Sit-out') floorUsable += (r.w - wt*2) * (r.h - wt*2);
        }

        const domItems = document.querySelectorAll(".room-item");
        rooms.forEach((r, idx) => { if(domItems[idx]) domItems[idx].classList.toggle('error-state', r.hasError); });

        const baseRooms = rooms.filter(r => !r.isNested); const nestedRooms = rooms.filter(r => r.isNested);
        generatedOpenings = calculateOpenings(rooms, L, W, activeFloorIndex);

        // Columns
        ctx.fillStyle = "#0f172a";
        for(let x = SETBACKS.sides; x <= L - SETBACKS.sides + EPSILON; x += gridSpacing) {
            for(let y = SETBACKS.front; y <= W - SETBACKS.rear + EPSILON; y += gridSpacing) {
                let isInsideFootprint = baseRooms.some(r => x >= r.x - EPSILON && x <= r.x + r.w + EPSILON && y >= r.y - EPSILON && y <= r.y + r.h + EPSILON);
                if (isInsideFootprint) ctx.fillRect((x - 0.15) * scale, (y - 0.15) * scale, 0.3 * scale, 0.3 * scale);
            }
        }

        // REALISM: Base Walls with Drop Shadows
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.25)";
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 4;
        ctx.fillStyle = "#1e293b"; baseRooms.forEach(r => ctx.fillRect(r.x * scale, r.y * scale, r.w * scale, r.h * scale));
        ctx.fillStyle = "#334155"; nestedRooms.forEach(r => ctx.fillRect(r.x * scale, r.y * scale, r.w * scale, r.h * scale));
        ctx.restore();
        
        // Base Floors with subtle gradient lighting effect
        baseRooms.forEach(r => { 
            let wt = WALL_EXT * scale; 
            let grad = ctx.createRadialGradient((r.x*scale + r.w*scale/2), (r.y*scale + r.h*scale/2), 0, (r.x*scale + r.w*scale/2), (r.y*scale + r.h*scale/2), Math.max(r.w, r.h)*scale);
            grad.addColorStop(0, "#ffffff"); grad.addColorStop(1, types[r.type].zone.color);
            ctx.fillStyle = grad; 
            ctx.fillRect(r.x * scale + wt, r.y * scale + wt, r.w * scale - 2*wt, r.h * scale - 2*wt); 
        });
        nestedRooms.forEach(r => { ctx.fillStyle = types[r.type].zone.color; let wt = WALL_INT * scale; ctx.fillRect(r.x * scale + wt, r.y * scale + wt, r.w * scale - 2*wt, r.h * scale - 2*wt); });

        generatedOpenings.doors.forEach(d => {
            ctx.fillStyle = "#fef2f2"; ctx.fillRect(d.x * scale, d.y * scale, d.w * scale, d.h * scale); 
            ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 2; ctx.beginPath();
            if (d.isVert) { ctx.moveTo(d.x * scale, d.y * scale); ctx.lineTo((d.x + d.h) * scale, d.y * scale); ctx.arc(d.x * scale, d.y * scale, d.h * scale, 0, Math.PI/2); } 
            else { ctx.moveTo(d.x * scale, d.y * scale); ctx.lineTo(d.x * scale, (d.y + d.w) * scale); ctx.arc(d.x * scale, d.y * scale, d.w * scale, 0, Math.PI/2); }
            ctx.stroke();
        });

        if (generatedOpenings.mainDoor) {
            let md = generatedOpenings.mainDoor; ctx.fillStyle = "#fef2f2"; 
            if(md.isVert) ctx.fillRect((md.x - WALL_EXT/2) * scale, md.y * scale, WALL_EXT * scale, md.h * scale); else ctx.fillRect(md.x * scale, (md.y - WALL_EXT/2) * scale, md.w * scale, WALL_EXT * scale);
            ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 3; ctx.beginPath(); 
            if (md.isVert) { ctx.moveTo(md.x * scale, md.y * scale); ctx.lineTo((md.x + md.h) * scale, md.y * scale); } else { ctx.moveTo(md.x * scale, md.y * scale); ctx.lineTo(md.x * scale, (md.y + md.w) * scale); }
            ctx.stroke();
        }

        generatedOpenings.windows.forEach(w => {
            ctx.fillStyle = "#38bdf8"; ctx.fillRect(w.x * scale, w.y * scale, w.w * scale, w.h * scale);
            ctx.strokeStyle = "#0284c7"; ctx.lineWidth = 1; ctx.strokeRect(w.x * scale, w.y * scale, w.w * scale, w.h * scale);
        });

        ctx.fillStyle = types[nestedRooms[0]?.type]?.zone.color || "#fff";
        nestedRooms.forEach(r => {
            if (r.nestedParent) {
                const doorSize = 0.75; let dX = r.x + r.w/2 - doorSize/2; let dY = r.y + r.h - WALL_INT; 
                ctx.fillRect(dX * scale, (dY - WALL_INT/2) * scale, doorSize * scale, WALL_INT * 2 * scale);
                ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(dX * scale, dY * scale); ctx.lineTo((dX + doorSize) * scale, dY * scale); ctx.arc(dX * scale, dY * scale, doorSize * scale, 0, Math.PI/2); ctx.stroke();
            }
        });

        rooms.forEach(r => {
            const pxX = r.x * scale; const pxY = r.y * scale; const pxW = r.w * scale; const pxH = r.h * scale;
            if (r.hasError) { ctx.fillStyle = "rgba(239, 68, 68, 0.4)"; ctx.fillRect(pxX, pxY, pxW, pxH); ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 4; ctx.strokeRect(pxX, pxY, pxW, pxH); }
            if(types[r.type].icon && !r.hasError) types[r.type].icon(ctx, pxX, pxY, pxW, pxH, scale);

            ctx.fillStyle = "#0f172a"; ctx.textAlign = "center"; ctx.font = `bold ${Math.max(10, scale/5)}px sans-serif`;
            let textY = pxY + pxH/2; if (nestedRooms.some(n => n.x >= r.x && n.y >= r.y && n.x+n.w <= r.x+r.w && n.y+n.h <= r.y+r.h)) textY = pxY + pxH - (WALL_EXT * scale) - 10; 
            ctx.fillText(r.type, pxX + pxW/2, textY);
            if(r.hasError) { ctx.fillStyle="#ef4444"; ctx.font = `bold 12px sans-serif`; let errMsg = r.isOut ? "⚠️ OUT OF BOUNDS" : "⚠️ COLLISION"; ctx.fillText(errMsg, pxX + pxW/2, pxY + pxH/2 + 16); }
        });

        let totalBuildingBuilt = 0; window.buildingData.floors.forEach(fl => { fl.forEach(r => { if(r.type !== 'Attached Bath' && r.type !== 'Car Porch' && r.type !== 'Sit-out') totalBuildingBuilt += (r.w * r.h); }); });
        document.getElementById("valBuilt").innerText = `${totalBuildingBuilt.toFixed(1)} m²`; 
        let maxFootprint = (L - SETBACKS.sides*2) * (W - SETBACKS.front - SETBACKS.rear); document.getElementById("valLand").innerText = `${maxFootprint.toFixed(1)} m²`;
        let floorBuilt = baseRooms.reduce((sum, r) => sum + (r.w * r.h), 0);
        const efficiency = floorBuilt > 0 ? (floorUsable / floorBuilt) : 0; const effBadge = document.getElementById("valEfficiency");
        if (floorBuilt === 0) { effBadge.innerText = "PENDING"; effBadge.style.background = "#e2e8f0"; effBadge.style.color = "#475569"; } 
        else if (efficiency >= 0.75) { effBadge.innerText = `${(efficiency*100).toFixed(0)}% (OPTIMAL)`; effBadge.style.background = "#dcfce7"; effBadge.style.color = "#166534"; } 
        else { effBadge.innerText = `${(efficiency*100).toFixed(0)}% (INEFFICIENT)`; effBadge.style.background = "#fef3c7"; effBadge.style.color = "#b45309"; }

        if (current3DMode) build3DModel(current3DMode);
    }

    // --- VECTORS ---
    function drawSofa(ctx, x, y, w, h, s) { ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(x + w/2 - s, y + h/2 + s*0.4, s*2, s*0.6); }
    function drawBed(ctx, x, y, w, h, s) { ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth=2; ctx.strokeRect(x + w*0.15, y + h/2 - s*0.8, s*1.6, s*1.6); }
    function drawKitchen(ctx, x, y, w, h, s) { ctx.fillStyle = "rgba(0,0,0,0.08)"; ctx.fillRect(x + w/2 - s*1.5, y + h/2 - s, s*3, s*0.6); }

    function drawStairs(ctx, x, y, w, h, s) { ctx.strokeStyle="rgba(0,0,0,0.2)"; ctx.lineWidth=1; const steps = 8; const stepW = w/steps; for(let i=0; i<steps; i++) { ctx.strokeRect(x + (i*stepW), y + h*0.2, stepW, h*0.6); } }

    // --- DRAG ENGINE ---
    let isDragging = false; let dragElement = null; let dOffX = 0; let dOffY = 0; let originalValidState = {x: 0, y: 0}; 
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect(); const mX = (e.clientX - rect.left) / scale; const mY = (e.clientY - rect.top) / scale;
        const els = [...document.querySelectorAll(".room-item")];
        for (let i = els.length - 1; i >= 0; i--) {
            const el = els[i]; if (el.querySelector("select").value === 'Staircase' && activeFloorIndex > 0) continue;
            const rx = +el.querySelector(".rx").value; const ry = +el.querySelector(".ry").value; const rw = +el.querySelector(".rw").value; const rh = +el.querySelector(".rh").value;
            if (mX >= rx && mX <= rx + rw && mY >= ry && mY <= ry + rh) { isDragging = true; dragElement = el; dOffX = mX - rx; dOffY = mY - ry; originalValidState = {x: rx, y: ry}; break; }
        }
    });
    canvas.addEventListener('mousemove', (e) => {
        if (!isDragging || !dragElement) return;
        const L = +document.getElementById("landLength").value || 20; const W = +document.getElementById("landWidth").value || 15;
        const rect = canvas.getBoundingClientRect(); let nX = (e.clientX - rect.left) / scale - dOffX; let nY = (e.clientY - rect.top) / scale - dOffY;
        const rw = +dragElement.querySelector(".rw").value; const rh = +dragElement.querySelector(".rh").value;
        nX = Math.max(SETBACKS.sides, Math.min(nX, L - SETBACKS.sides - rw)); nY = Math.max(SETBACKS.front, Math.min(nY, W - SETBACKS.rear - rh));
        dragElement.querySelector(".rx").value = Math.round(nX * 10) / 10; dragElement.querySelector(".ry").value = Math.round(nY * 10) / 10; renderCanvas();
    });
    canvas.addEventListener('mouseup', () => { if (isDragging && dragElement && dragElement.classList.contains('error-state')) { dragElement.querySelector(".rx").value = originalValidState.x; dragElement.querySelector(".ry").value = originalValidState.y; renderCanvas(); } isDragging = false; dragElement = null; });
    canvas.addEventListener('mouseleave', () => { if (isDragging && dragElement && dragElement.classList.contains('error-state')) { dragElement.querySelector(".rx").value = originalValidState.x; dragElement.querySelector(".ry").value = originalValidState.y; renderCanvas(); } isDragging = false; dragElement = null; });

    window.exportJSON = function() { saveCurrentFloorUI(); const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.buildingData, null, 2)); const dlAnchorElem = document.createElement('a'); dlAnchorElem.setAttribute("href", dataStr); dlAnchorElem.setAttribute("download", "ArchitectPro_Layout.json"); dlAnchorElem.click(); }
    window.exportSVG = function() {
        saveCurrentFloorUI();
        const L = +document.getElementById("landLength").value || 20; const W = +document.getElementById("landWidth").value || 15; const svgScale = 30; 
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${L*svgScale} ${W*svgScale}"><style>rect { stroke-linejoin: round; } text { font-family: sans-serif; font-weight: bold; font-size: 12px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }</style><rect x="0" y="0" width="${L*svgScale}" height="${W*svgScale}" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" />`;
        let rooms = window.buildingData.floors[activeFloorIndex]; if(!rooms) return;
        let gWalls = `<g id="WALLS">`; let gFloors = `<g id="FLOORS">`; let gDoors = `<g id="DOORS">`; let gWindows = `<g id="WINDOWS">`; let gText = `<g id="ANNOTATIONS">`;
        rooms.filter(r => !r.isNested).forEach(r => { gWalls += `<rect x="${r.x*svgScale}" y="${r.y*svgScale}" width="${r.w*svgScale}" height="${r.h*svgScale}" fill="#334155" />`; });
        rooms.filter(r => !r.isNested).forEach(r => { let wt = r.wt || WALL_EXT; gFloors += `<rect x="${r.x*svgScale + wt*svgScale}" y="${r.y*svgScale + wt*svgScale}" width="${r.w*svgScale - 2*wt*svgScale}" height="${r.h*svgScale - 2*wt*svgScale}" fill="${types[r.type].zone.color}" />`; });
        rooms.filter(r => r.isNested).forEach(r => { let wt = r.wt || WALL_INT; gWalls += `<rect x="${r.x*svgScale}" y="${r.y*svgScale}" width="${r.w*svgScale}" height="${r.h*svgScale}" fill="#334155" />`; gFloors += `<rect x="${r.x*svgScale + wt*svgScale}" y="${r.y*svgScale + wt*svgScale}" width="${r.w*svgScale - 2*wt*svgScale}" height="${r.h*svgScale - 2*wt*svgScale}" fill="${types[r.type].zone.color}" />`; });
        generatedOpenings.doors.forEach(d => { gDoors += `<rect x="${d.x*svgScale}" y="${d.y*svgScale}" width="${d.w*svgScale}" height="${d.h*svgScale}" fill="#ffffff" />`; let path = d.isVert ? `M ${d.x*svgScale} ${d.y*svgScale} L ${(d.x+d.h)*svgScale} ${d.y*svgScale} A ${d.h*svgScale} ${d.h*svgScale} 0 0 1 ${d.x*svgScale} ${(d.y+d.h)*svgScale}` : `M ${d.x*svgScale} ${d.y*svgScale} L ${d.x*svgScale} ${(d.y+d.w)*svgScale} A ${d.w*svgScale} ${d.w*svgScale} 0 0 0 ${(d.x+d.w)*svgScale} ${d.y*svgScale}`; gDoors += `<path d="${path}" stroke="#f59e0b" stroke-width="2" fill="none" />`; });
        if (generatedOpenings.mainDoor) { let md = generatedOpenings.mainDoor; if(md.isVert) gDoors += `<rect x="${(md.x - WALL_EXT/2)*svgScale}" y="${md.y*svgScale}" width="${WALL_EXT*svgScale}" height="${md.h*svgScale}" fill="#ffffff" />`; else gDoors += `<rect x="${md.x*svgScale}" y="${(md.y - WALL_EXT/2)*svgScale}" width="${md.w*svgScale}" height="${WALL_EXT*svgScale}" fill="#ffffff" />`; }
        generatedOpenings.windows.forEach(w => { gWindows += `<rect x="${w.x*svgScale}" y="${w.y*svgScale}" width="${w.w*svgScale}" height="${w.h*svgScale}" fill="#38bdf8" stroke="#0284c7" stroke-width="1" />`; });
        rooms.forEach(r => { let yOff = rooms.filter(n => n.isNested).some(n => n.x >= r.x && n.y >= r.y && n.x+n.w <= r.x+r.w && n.y+n.h <= r.y+r.h) ? -15 : 0; gText += `<text x="${(r.x + r.w/2)*svgScale}" y="${(r.y + r.h/2)*svgScale + yOff}">${r.type}</text>`; });
        svg += gFloors + `</g>` + gWalls + `</g>` + gDoors + `</g>` + gWindows + `</g>` + gText + `</g></svg>`;
        const dataStr = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `ArchitectPro_Floor${activeFloorIndex}_Vector.svg`); dl.click();
    }

    // --- 3D ENGINE (DYNAMIC LIGHTING & TEXTURES) ---
    window.toggle3DView = function(mode) {
        const c2d = document.getElementById('canvas-container'); const c3d = document.getElementById('view-3d'); const swt = document.getElementById('floorSwitcher'); const instr = document.getElementById('drag-instruction');
        if (current3DMode === mode) { current3DMode = null; c2d.style.display = 'flex'; swt.style.display = 'flex'; instr.style.display = 'block'; c3d.style.display = 'none'; } 
        else { current3DMode = mode; c2d.style.display = 'none'; swt.style.display = 'none'; instr.style.display = 'none'; c3d.style.display = 'block'; if(!renderer) init3D(); build3DModel(mode); }
    };

    function init3D() {
        const container = document.getElementById('view-3d');
        scene = new THREE.Scene(); scene.background = new THREE.Color(0xe0f2fe); 
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(container.clientWidth, container.clientHeight); 
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        container.appendChild(renderer.domElement);
        controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.dampingFactor = 0.05; controls.maxPolarAngle = Math.PI / 2 - 0.01; 
        
        // Dynamic Lighting System
        globalHemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5); 
        scene.add(globalHemiLight);
        globalSunLight = new THREE.DirectionalLight(0xffffff, 1.0); 
        globalSunLight.castShadow = true; 
        globalSunLight.shadow.mapSize.width = 2048; globalSunLight.shadow.mapSize.height = 2048;
        globalSunLight.shadow.camera.left = -20; globalSunLight.shadow.camera.right = 20; globalSunLight.shadow.camera.top = 20; globalSunLight.shadow.camera.bottom = -20;
        globalSunLight.shadow.bias = -0.0005;
        scene.add(globalSunLight);

        updateSunlight(); // Set initial sun position

        window.addEventListener('resize', () => { if(current3DMode && container.clientWidth > 0) { camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); } });
        animate3D();
    }

    window.updateSunlight = function() {
        const time = parseFloat(document.getElementById('timeOfDay').value);
        let hours = Math.floor(time); let mins = time % 1 === 0.5 ? "30" : "00";
        let ampm = hours >= 12 ? "PM" : "AM";
        let displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);
        document.getElementById('timeLabel').innerText = `${displayHours}:${mins} ${ampm}`;

        if (!globalSunLight) return;

        // Map time (6 to 20) to an angle (0 to PI)
        const angle = ((time - 6) / 14) * Math.PI;
        const radius = 60;
        globalSunLight.position.x = Math.cos(angle) * radius;
        globalSunLight.position.y = Math.sin(angle) * radius;
        globalSunLight.position.z = 15; 

        // Adjust color and intensity based on time
        if (time < 8 || time > 17.5) {
            globalSunLight.color.setHex(0xffa055); // Sunrise/Sunset orange
            globalSunLight.intensity = 0.4;
            globalHemiLight.intensity = 0.2;
            scene.background = new THREE.Color(0x1e293b); // Night sky
        } else {
            globalSunLight.color.setHex(0xffffee); // Midday white
            globalSunLight.intensity = 1.0;
            globalHemiLight.intensity = 0.5;
            scene.background = new THREE.Color(0xe0f2fe); // Day sky
        }
    };

    function createTextSprite(text) {
        const canvas = document.createElement('canvas'); const context = canvas.getContext('2d'); context.font = `bold 48px sans-serif`; canvas.width = context.measureText(text).width + 40; canvas.height = 78; context.font = `bold 48px sans-serif`; context.textAlign = "center"; context.textBaseline = "middle"; context.fillStyle = "rgba(255, 255, 255, 0.85)"; context.fillRect(0, 0, canvas.width, canvas.height); context.strokeStyle = "#475569"; context.lineWidth = 4; context.strokeRect(0, 0, canvas.width, canvas.height); context.fillStyle = "#0f172a"; context.fillText(text, canvas.width / 2, canvas.height / 2 + 2);
        const texture = new THREE.CanvasTexture(canvas); texture.minFilter = THREE.LinearFilter; const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false })); sprite.scale.set(canvas.width * 0.015, canvas.height * 0.015, 1); return sprite;
    }

    function build3DModel(mode) {
        const houseGroup = new THREE.Group(); houseGroup.name = "HouseModel";
        if (scene.getObjectByName("HouseModel")) scene.remove(scene.getObjectByName("HouseModel"));

        const L = +document.getElementById("landLength").value || 20; const W = +document.getElementById("landWidth").value || 15;
        const ox = -L / 2; const oz = -W / 2;

        const land = new THREE.Mesh(new THREE.PlaneGeometry(L * 2, W * 2), new THREE.MeshStandardMaterial({ color: 0x86efac, roughness: 1.0 }));
        land.rotation.x = -Math.PI / 2; land.position.y = -0.01; land.receiveShadow = true; houseGroup.add(land);

        const wallHeight = 3; 
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.9 }); 
        const wallTopMat = new THREE.MeshStandardMaterial({ color: 0x475569 }); 
        const doorMat = new THREE.MeshStandardMaterial({ color: 0xa16207, roughness: 0.8 }); 
        const mainDoorMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.6 }); 
        const winMat = new THREE.MeshPhysicalMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4, roughness: 0.05, metalness: 0.2 }); 

        const floorsToRender = mode === 'building' ? window.buildingData.floors : [window.buildingData.floors[activeFloorIndex]];

        floorsToRender.forEach((floorRooms, index) => {
            if (!floorRooms) return;
            const floorYOffset = mode === 'building' ? index * wallHeight : 0;

            floorRooms.forEach(r => {
                if (r.x < SETBACKS.sides || r.y < SETBACKS.front || r.x + r.w > L - SETBACKS.sides || r.y + r.h > W - SETBACKS.rear) return; 
                
                const cx = ox + r.x + (r.w/2); const cz = oz + r.y + (r.h/2);
                let isNested = false;
                for (let other of floorRooms) { if (r !== other && r.w < other.w && r.h < other.h && r.x >= other.x - EPSILON && r.y >= other.y - EPSILON && r.x + r.w <= other.x + other.w + EPSILON && r.y + r.h <= other.y + other.h + EPSILON) { isNested = true; break; } }
                const wT = isNested ? WALL_INT : WALL_EXT; const zoneColor = types[r.type] ? types[r.type].zone.hex : 0xffffff;

                const floor = new THREE.Mesh(new THREE.PlaneGeometry(r.w, r.h), new THREE.MeshStandardMaterial({ color: zoneColor, roughness: 0.6 }));
                floor.rotation.x = -Math.PI / 2; floor.position.set(cx, floorYOffset + 0.01, cz); floor.receiveShadow = true; houseGroup.add(floor);

                // Add Interior Procedural Lights
                if ((mode === 'floor' || mode === 'building') && (r.type === 'Hall' || r.type === 'Bedroom' || r.type === 'Dining')) {
                    const roomLight = new THREE.PointLight(0xfff0dd, 0.4, 10);
                    roomLight.position.set(cx, floorYOffset + wallHeight - 0.5, cz);
                    houseGroup.add(roomLight);
                }

                if (mode === 'building' && index < window.buildingData.floors.length - 1 && r.type !== 'Staircase') {
                    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(r.w, r.h), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    ceil.rotation.x = Math.PI / 2; ceil.position.set(cx, floorYOffset + wallHeight - 0.01, cz); houseGroup.add(ceil);
                }

                if (mode === 'building' && index === floorsToRender.length - 1) {
                    if (r.type !== 'Staircase' && !isNested && r.type !== 'Balcony' && r.type !== 'Car Porch') {
                        const roof = new THREE.Mesh(new THREE.PlaneGeometry(r.w, r.h), new THREE.MeshStandardMaterial({ color: 0xcbd5e1 }));
                        roof.rotation.x = Math.PI / 2; roof.position.set(cx, floorYOffset + wallHeight, cz); roof.receiveShadow = true; houseGroup.add(roof);
                    }
                    let isExtW = Math.abs(r.x - SETBACKS.sides) < 0.15; let isExtE = Math.abs((r.x + r.w) - (L - SETBACKS.sides)) < 0.15;
                    let isExtN = Math.abs(r.y - SETBACKS.front) < 0.15; let isExtS = Math.abs((r.y + r.h) - (W - SETBACKS.rear)) < 0.15;
                    const pHeight = 0.9; 
                    if (r.type !== 'Car Porch' && r.type !== 'Balcony' && !isNested) {
                        if (isExtN) { const pN = new THREE.Mesh(new THREE.BoxGeometry(r.w, pHeight, wT), wallMat); pN.position.set(cx, floorYOffset + wallHeight + pHeight/2, cz - (r.h/2) + (wT/2)); pN.castShadow=true; pN.receiveShadow=true; houseGroup.add(pN); }
                        if (isExtS) { const pS = new THREE.Mesh(new THREE.BoxGeometry(r.w, pHeight, wT), wallMat); pS.position.set(cx, floorYOffset + wallHeight + pHeight/2, cz + (r.h/2) - (wT/2)); pS.castShadow=true; pS.receiveShadow=true; houseGroup.add(pS); }
                        if (isExtW) { const pW = new THREE.Mesh(new THREE.BoxGeometry(wT, pHeight, r.h), wallMat); pW.position.set(cx - (r.w/2) + (wT/2), floorYOffset + wallHeight + pHeight/2, cz); pW.castShadow=true; pW.receiveShadow=true; houseGroup.add(pW); }
                        if (isExtE) { const pE = new THREE.Mesh(new THREE.BoxGeometry(wT, pHeight, r.h), wallMat); pE.position.set(cx + (r.w/2) - (wT/2), floorYOffset + wallHeight + pHeight/2, cz); pE.castShadow=true; pE.receiveShadow=true; houseGroup.add(pE); }
                    }
                }

                if (r.type === 'Staircase') {
                    const steps = 12; const stepMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 }); const innerW = r.w - (wT * 2); const innerH = r.h - (wT * 2);
                    if (innerW > innerH) { const stepW = innerW / steps; const stepRise = wallHeight / steps; for (let i = 0; i < steps; i++) { const mesh = new THREE.Mesh(new THREE.BoxGeometry(stepW, stepRise * (i + 1), innerH), stepMat); mesh.position.set(cx - innerW/2 + i*stepW + stepW/2, floorYOffset + (stepRise * (i + 1))/2, cz); mesh.castShadow=true; mesh.receiveShadow=true; houseGroup.add(mesh); } } 
                    else { const stepD = innerH / steps; const stepRise = wallHeight / steps; for (let i = 0; i < steps; i++) { const mesh = new THREE.Mesh(new THREE.BoxGeometry(innerW, stepRise * (i + 1), stepD), stepMat); mesh.position.set(cx, floorYOffset + (stepRise * (i + 1))/2, cz - innerH/2 + i*stepD + stepD/2); mesh.castShadow=true; mesh.receiveShadow=true; houseGroup.add(mesh); } }
                }

                let hWall = (r.type === 'Sit-out' || r.type === 'Balcony' || r.type === 'Car Porch') ? 0.9 : wallHeight;

                const hzWallGeo = new THREE.BoxGeometry(r.w, hWall, wT); const vtWallGeo = new THREE.BoxGeometry(wT, hWall, r.h - (wT*2)); const matArr = [wallMat, wallMat, wallTopMat, wallMat, wallMat, wallMat];
                const wallN = new THREE.Mesh(hzWallGeo, matArr); wallN.position.set(cx, floorYOffset + hWall/2, cz - (r.h/2) + (wT/2)); wallN.castShadow=true; wallN.receiveShadow=true; houseGroup.add(wallN);
                const wallS = new THREE.Mesh(hzWallGeo, matArr); wallS.position.set(cx, floorYOffset + hWall/2, cz + (r.h/2) - (wT/2)); wallS.castShadow=true; wallS.receiveShadow=true; houseGroup.add(wallS);
                const wallW = new THREE.Mesh(vtWallGeo, matArr); wallW.position.set(cx - (r.w/2) + (wT/2), floorYOffset + hWall/2, cz); wallW.castShadow=true; wallW.receiveShadow=true; houseGroup.add(wallW);
                const wallE = new THREE.Mesh(vtWallGeo, matArr); wallE.position.set(cx + (r.w/2) - (wT/2), floorYOffset + hWall/2, cz); wallE.castShadow=true; wallE.receiveShadow=true; houseGroup.add(wallE);

                if (mode === 'floor' || index === floorsToRender.length - 1) {
                    const label = createTextSprite(r.type); label.position.set(cx, floorYOffset + wallHeight + 1.2, cz); houseGroup.add(label);
                }
            });

            if ((mode === 'floor' || mode === 'building') && index === activeFloorIndex) {
                generatedOpenings.doors.forEach(d => {
                    const dHeight = 2.1; const dx = ox + d.x + d.w/2; const dz = oz + d.y + d.h/2;
                    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(d.w * 1.1, dHeight, d.h * 1.1), doorMat);
                    dMesh.position.set(dx, floorYOffset + dHeight/2, dz); dMesh.castShadow=true; dMesh.receiveShadow=true; houseGroup.add(dMesh);
                });
                
                if (generatedOpenings.mainDoor && index === 0) {
                    let md = generatedOpenings.mainDoor;
                    const dHeight = 2.4; const dx = ox + md.x + md.w/2; const dz = oz + md.y + md.h/2;
                    const dMesh = new THREE.Mesh(new THREE.BoxGeometry(md.w * 1.2, dHeight, md.h * 1.2), mainDoorMat);
                    dMesh.position.set(dx, floorYOffset + dHeight/2, dz); dMesh.castShadow=true; dMesh.receiveShadow=true; houseGroup.add(dMesh);
                }

                generatedOpenings.windows.forEach(w => {
                    let isBath = w.room && w.room.type.includes('Bath');
                    const wHeight = isBath ? 0.6 : 1.2; const sillHeight = isBath ? 1.5 : 0.9; 
                    const wx = ox + w.x + w.w/2; const wz = oz + w.y + w.h/2;
                    
                    const frame = new THREE.Mesh(new THREE.BoxGeometry(w.w * 1.1, wHeight + 0.1, w.h * 1.1), wallTopMat);
                    frame.position.set(wx, floorYOffset + sillHeight + wHeight/2, wz); frame.castShadow=true; houseGroup.add(frame);

                    const wMesh = new THREE.Mesh(new THREE.BoxGeometry(w.w * 1.15, wHeight, w.h * 1.15), winMat);
                    wMesh.position.set(wx, floorYOffset + sillHeight + wHeight/2, wz); houseGroup.add(wMesh);
                });
            }
        });

        scene.add(houseGroup);
        let camHeight = (mode === 'building' ? floorsToRender.length * wallHeight : wallHeight) + 10;
        camera.position.set(L*0.8, camHeight, W*0.8); controls.target.set(0, camHeight/2, 0); controls.update();
    }

    function animate3D() { requestAnimationFrame(animate3D); if(current3DMode) { controls.update(); renderer.render(scene, camera); } }

    setTimeout(generateParametric, 100);
})();
</script>
